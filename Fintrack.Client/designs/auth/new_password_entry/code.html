<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e6a7b",
                        "background-light": "#f6f7f8",
                        "background-dark": "#0B0E11",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Set New Password | Security Center</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex min-h-screen flex-col items-center justify-center p-4">
<div class="w-full max-w-md">
<div class="mb-8 flex flex-col items-center gap-4">
<div class="flex items-center justify-center w-12 h-12 rounded-xl bg-primary/10 text-primary">
<span class="material-symbols-outlined text-3xl">lock_reset</span>
</div>
<div class="text-center">
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Secure Your Account</h1>
<p class="mt-2 text-sm text-slate-500 dark:text-slate-400">Choose a strong, unique password to protect your data.</p>
</div>
</div>
<div class="bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 p-8 rounded-xl shadow-2xl backdrop-blur-sm">
<form class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">New Password</label>
<div class="relative flex items-center">
<input class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-primary py-3.5 px-4 pr-12 transition-all" placeholder="Enter at least 8 characters" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="space-y-3">
<div class="flex items-center justify-between px-1">
<span class="text-xs font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider">Password Strength</span>
<span class="text-xs font-bold text-primary">Strong • 85%</span>
</div>
<div class="h-1.5 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-500" style="width: 85%"></div>
</div>
<p class="text-[11px] text-slate-500 dark:text-slate-400 italic">
                            Tip: Use a mix of uppercase, lowercase, numbers, and symbols.
                        </p>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Confirm Password</label>
<div class="relative flex items-center">
<input class="form-input block w-full rounded-xl border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:border-primary focus:ring-primary py-3.5 px-4 pr-12 transition-all" placeholder="Repeat new password" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<button class="w-full flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 active:scale-[0.98]" type="submit">
<span class="material-symbols-outlined text-xl">verified_user</span>
                        Update Password
                    </button>
</form>
</div>
<div class="mt-8 text-center">
<a class="inline-flex items-center gap-2 text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-lg">arrow_back</span>
                    Back to Sign In
                </a>
</div>
</div>
<div class="fixed bottom-8 flex gap-8 opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-6xl text-primary">shield</span>
<span class="material-symbols-outlined text-6xl text-primary">encrypted</span>
<span class="material-symbols-outlined text-6xl text-primary">key</span>
</div>
</div>
</body></html>
