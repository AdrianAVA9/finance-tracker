<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1e6a7b",
                        "background-light": "#f6f7f8",
                        "background-dark": "#0B0E11",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display">
<!-- Main Container -->
<div class="flex flex-1 items-center justify-center px-4">
<!-- Centered Reset Card -->
<div class="w-full max-w-md bg-slate-900/40 border border-slate-800 p-8 rounded-xl shadow-2xl">
<!-- Logo/Brand Section -->
<div class="flex flex-col items-center mb-8">
<div class="bg-primary/20 p-3 rounded-full mb-4">
<span class="material-symbols-outlined text-primary text-3xl">shield_lock</span>
</div>
<h1 class="text-slate-100 text-2xl font-bold tracking-tight">Sentinel Secure</h1>
<p class="text-slate-400 text-sm mt-2 text-center">Enter your email to receive a password recovery link.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6">
<div class="space-y-2">
<label class="text-slate-200 text-sm font-medium block ml-1" for="email">
                        Email Address
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">mail</span>
<input class="w-full pl-12 pr-4 py-3.5 bg-slate-950 border border-slate-800 rounded-lg text-slate-100 placeholder:text-slate-600 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Navigation Links -->
<div class="mt-8 pt-6 border-t border-slate-800 text-center">
<a class="text-slate-400 hover:text-primary text-sm font-medium transition-colors inline-flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-lg">arrow_back</span>
                    Back to Login
                </a>
</div>
</div>
</div>
<!-- Footer Security Note -->
<footer class="py-8 text-center">
<div class="flex items-center justify-center gap-2 text-slate-600 text-xs font-medium uppercase tracking-widest">
<span class="material-symbols-outlined text-sm">verified_user</span>
            End-to-End Encrypted Recovery
        </div>
</footer>
</body></html>
