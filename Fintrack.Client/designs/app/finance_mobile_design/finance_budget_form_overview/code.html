<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CERO Onyx - Budget Registration</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-secondary-container": "#84c6a0",
            "background": "#111317",
            "tertiary-fixed": "#ffdad7",
            "on-primary-fixed": "#002112",
            "surface-container-low": "#1a1c20",
            "on-error-container": "#ffdad6",
            "on-primary-fixed-variant": "#005233",
            "on-surface": "#e2e2e8",
            "surface-container": "#1e2024",
            "surface-variant": "#333539",
            "on-tertiary-fixed-variant": "#930014",
            "on-secondary-fixed": "#002112",
            "primary-fixed": "#4dffb1",
            "primary-container": "#05e699",
            "outline-variant": "#3b4a40",
            "on-tertiary-fixed": "#410004",
            "primary-fixed-dim": "#00e296",
            "outline": "#849589",
            "error": "#ffb4ab",
            "on-primary-container": "#00623e",
            "surface": "#111317",
            "on-secondary-fixed-variant": "#065134",
            "on-surface-variant": "#bacbbe",
            "inverse-primary": "#006c46",
            "secondary-fixed-dim": "#92d5ae",
            "surface-container-highest": "#333539",
            "secondary": "#92d5ae",
            "tertiary-container": "#ffb8b3",
            "surface-bright": "#37393e",
            "on-tertiary-container": "#ac061b",
            "surface-dim": "#111317",
            "on-tertiary": "#68000b",
            "primary": "#77ffbb",
            "on-secondary": "#003822",
            "inverse-surface": "#e2e2e8",
            "tertiary": "#ffdedc",
            "surface-container-high": "#282a2e",
            "on-primary": "#003822",
            "on-background": "#e2e2e8",
            "on-error": "#690005",
            "error-container": "#93000a",
            "secondary-fixed": "#adf1c9",
            "tertiary-fixed-dim": "#ffb3ae",
            "surface-tint": "#00e296",
            "surface-container-lowest": "#0c0e12",
            "inverse-on-surface": "#2f3035",
            "secondary-container": "#0b5436"
          },
          fontFamily: {
            "headline": ["Manrope"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      background-color: #111317;
      color: #e2e2e8;
    }
    .hero-input-focus:focus-within {
      background: rgba(5, 230, 153, 0.05);
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#111317]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-3">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#05E699]">arrow_back</span>
</button>
<h1 class="font-manrope font-bold tracking-tight text-xl font-black tracking-tighter text-[#05E699]">CERO</h1>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden border border-outline-variant/20">
<img class="w-full h-full object-cover" data-alt="Portrait of a professional man with clean lighting and neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBR9Q2SvhdYb8UCtxeyzpZSCeWdSGkWyMzqIZB_jyba2NmVuh1AXwomt-aj8av3Wkx9V6CRTOnn1hcX0jeZ9kw0ndSETL5I2Ky455Z7u7ehmL3ulbif4GcPcfDZFLj7RthP9x-lpO4JlZRiu0swA70XCAnQfpUctOiw4VcyRSIS6gdCxZwbWc58w6wNIm9o0XtSq7p3oGaNnRTooWpSOIxvhuhyuspz9SLhgSHYQViAjD8KEwBvDbPJb_bR9ycZmSx5-KCKaIABfShU"/>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto min-h-screen">
<!-- Header Section -->
<div class="mb-10">
<h2 class="font-headline text-3xl font-extrabold tracking-tight mb-2 text-on-surface">Edit Budget</h2>
<p class="text-on-surface-variant font-medium text-sm">Fine-tune your financial boundaries for better precision.</p>
</div>
<!-- Form Content -->
<form class="space-y-8">
<!-- Hero Amount Input -->
<section class="relative group">
<label class="block font-label text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant mb-4">Monthly Limit</label>
<div class="hero-input-focus transition-all duration-300 p-8 rounded-2xl bg-surface-container-low border border-outline-variant/10 flex flex-col items-center justify-center">
<div class="flex items-baseline gap-2">
<span class="font-headline text-4xl font-bold text-[#05E699]">₡</span>
<input class="bg-transparent border-none text-center font-headline text-6xl font-black tracking-tighter focus:ring-0 text-on-surface w-full max-w-[240px]" placeholder="0" type="number" value="450000"/>
</div>
<div class="mt-4 px-4 py-1.5 rounded-full bg-primary-container/10 border border-primary-container/20">
<span class="text-[#05E699] font-label text-xs font-semibold">REMAINING: ₡124,000</span>
</div>
</div>
</section>
<!-- Budget Name -->
<section>
<label class="block font-label text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant mb-3">Budget Name</label>
<div class="relative">
<input class="w-full bg-surface-container px-5 py-4 rounded-xl border border-outline-variant/10 focus:border-[#05E699]/40 focus:ring-0 transition-all font-body text-on-surface font-medium placeholder:text-on-surface-variant/40" placeholder="e.g. Groceries" type="text" value="Entertainment &amp; Lifestyle"/>
</div>
</section>
<!-- Category Select -->
<section>
<label class="block font-label text-[10px] font-bold uppercase tracking-[0.1em] text-on-surface-variant mb-3">Category</label>
<div class="relative group">
<select class="w-full appearance-none bg-surface-container px-5 py-4 rounded-xl border border-outline-variant/10 focus:border-[#05E699]/40 focus:ring-0 transition-all font-body text-on-surface font-medium cursor-pointer">
<option>Leisure &amp; Fun</option>
<option selected="">Entertainment</option>
<option>Shopping</option>
<option>Utilities</option>
<option>Health</option>
</select>
<div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-sm">unfold_more</span>
</div>
<div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center pointer-events-none opacity-0">
<!-- Icon mapping logic if needed, but select covers label -->
</div>
</div>
<!-- Quick Suggestions -->
<div class="flex gap-2 mt-4 overflow-x-auto no-scrollbar">
<button class="flex-shrink-0 px-4 py-2 rounded-full bg-surface-container border border-outline-variant/10 flex items-center gap-2 hover:bg-surface-container-high transition-colors" type="button">
<span class="material-symbols-outlined text-[16px] text-on-secondary-container">movie</span>
<span class="text-xs font-semibold text-on-surface">Cinema</span>
</button>
<button class="flex-shrink-0 px-4 py-2 rounded-full bg-surface-container border border-outline-variant/10 flex items-center gap-2 hover:bg-surface-container-high transition-colors" type="button">
<span class="material-symbols-outlined text-[16px] text-on-secondary-container">restaurant</span>
<span class="text-xs font-semibold text-on-surface">Dining</span>
</button>
<button class="flex-shrink-0 px-4 py-2 rounded-full bg-surface-container border border-outline-variant/10 flex items-center gap-2 hover:bg-surface-container-high transition-colors" type="button">
<span class="material-symbols-outlined text-[16px] text-on-secondary-container">fitness_center</span>
<span class="text-xs font-semibold text-on-surface">Gym</span>
</button>
</div>
</section>
<!-- Set Alert Toggle -->
<section class="bg-surface-container-low p-5 rounded-2xl border border-outline-variant/5">
<div class="flex items-center justify-between">
<div class="flex gap-4">
<div class="w-10 h-10 rounded-xl bg-[#05E699]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[#05E699]">notifications_active</span>
</div>
<div>
<h4 class="font-headline text-sm font-bold text-on-surface">Threshold Alert</h4>
<p class="text-xs text-on-surface-variant">Notify me at 85% of limit</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-12 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#05E699]"></div>
</label>
</div>
</section>
<!-- Action Buttons -->
<div class="pt-4 space-y-4">
<button class="w-full bg-[#05E699] text-[#003822] font-headline font-extrabold py-5 rounded-xl hover:opacity-90 active:scale-[0.98] transition-all shadow-[0_8px_30px_rgb(5,230,153,0.15)]" type="submit">
          Save Budget
        </button>
<button class="w-full bg-surface-container-high text-on-surface font-headline font-bold py-5 rounded-xl hover:bg-surface-variant active:scale-[0.98] transition-all" type="button">
          Cancel
        </button>
</div>
<!-- Edit Mode Only: Delete -->
<div class="pt-12 border-t border-outline-variant/10">
<button class="w-full group flex items-center justify-center gap-2 py-4 text-[#FF4D4D] font-headline font-bold hover:bg-[#FF4D4D]/5 rounded-xl transition-colors active:scale-95" type="button">
<span class="material-symbols-outlined text-[20px]">delete_sweep</span>
          Delete Budget
        </button>
<p class="text-center text-[10px] text-on-surface-variant/40 mt-4 uppercase tracking-widest">Permanent Action</p>
</div>
</form>
</main>
<!-- BottomNavBar (Suppressed as per transactional flow rule, but providing for structural consistency if needed) -->
<!-- Navigation suppressed for focus journey -->
<!-- Floating Decoration (Editorial Aesthetic) -->
<div class="fixed -bottom-20 -left-20 w-64 h-64 bg-[#05E699]/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed -top-20 -right-20 w-64 h-64 bg-primary-container/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
