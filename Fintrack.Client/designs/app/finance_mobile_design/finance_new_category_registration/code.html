<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cero Onyx - New Category</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#006c46",
                        "on-tertiary": "#68000b",
                        "on-error": "#690005",
                        "primary-fixed": "#4dffb1",
                        "on-secondary-fixed-variant": "#065134",
                        "surface-dim": "#111317",
                        "tertiary": "#ffdedc",
                        "on-surface-variant": "#bacbbe",
                        "on-error-container": "#ffdad6",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb3ae",
                        "surface-variant": "#333539",
                        "on-surface": "#e2e2e8",
                        "inverse-on-surface": "#2f3035",
                        "surface-container-low": "#1a1c20",
                        "on-secondary-fixed": "#002112",
                        "secondary-fixed-dim": "#92d5ae",
                        "surface-tint": "#00e296",
                        "outline-variant": "#3b4a40",
                        "on-primary-container": "#00623e",
                        "inverse-surface": "#e2e2e8",
                        "secondary": "#92d5ae",
                        "primary-fixed-dim": "#00e296",
                        "on-tertiary-container": "#ac061b",
                        "surface-container-high": "#282a2e",
                        "on-secondary": "#003822",
                        "surface": "#111317",
                        "tertiary-fixed": "#ffdad7",
                        "secondary-fixed": "#adf1c9",
                        "on-background": "#e2e2e8",
                        "on-tertiary-fixed-variant": "#930014",
                        "error": "#ffb4ab",
                        "on-primary-fixed-variant": "#005233",
                        "secondary-container": "#0b5436",
                        "on-primary": "#003822",
                        "surface-bright": "#37393e",
                        "surface-container-highest": "#333539",
                        "primary": "#77ffbb",
                        "tertiary-container": "#ffb8b3",
                        "outline": "#849589",
                        "on-secondary-container": "#84c6a0",
                        "surface-container-lowest": "#0c0e12",
                        "background": "#111317",
                        "on-primary-fixed": "#002112",
                        "primary-container": "#05e699",
                        "on-tertiary-fixed": "#410004",
                        "surface-container": "#1e2024"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "display": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-dim text-on-surface font-body selection:bg-primary-container selection:text-on-primary">
<!-- Top App Bar -->
<header class="bg-[#111317] flex justify-between items-center w-full px-6 py-4 fixed top-0 z-50">
<div class="flex items-center gap-4">
<button class="text-[#05E699] hover:bg-[#2A2F37] transition-colors p-2 rounded-full active:scale-95 duration-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-[#F3F4F6] font-['Manrope'] font-extrabold text-lg tracking-tight">New Category</h1>
</div>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto">
<!-- Form Container -->
<form class="space-y-10">
<!-- Category Type Toggle -->
<div class="bg-surface-container-low p-1 rounded-xl flex items-center">
<button class="flex-1 py-3 px-4 rounded-lg bg-surface-container-highest text-on-surface font-semibold text-sm transition-all duration-300" type="button">
                    Expense
                </button>
<button class="flex-1 py-3 px-4 rounded-lg text-outline font-medium text-sm hover:text-on-surface transition-colors" type="button">
                    Income
                </button>
</div>
<!-- Category Name Input -->
<section class="space-y-3">
<label class="text-[10px] uppercase tracking-[0.2em] font-bold text-outline">Category Name</label>
<input class="w-full bg-transparent border-none p-0 text-3xl font-headline font-bold text-on-surface placeholder:text-surface-variant focus:ring-0 focus:outline-none" placeholder="e.g. Fine Dining" type="text"/>
<div class="h-[1px] w-full bg-gradient-to-r from-primary-container/40 to-transparent"></div>
</section>
<!-- Parent Group Selection -->
<section class="space-y-4">
<label class="text-[10px] uppercase tracking-[0.2em] font-bold text-outline">Assign to Group</label>
<div class="relative">
<select class="w-full bg-surface-container border-none rounded-xl py-4 px-5 text-on-surface appearance-none focus:ring-2 focus:ring-primary-container/20 font-medium">
<option>Básicos Mensuales</option>
<option>Mascota</option>
<option>Seguros</option>
<option>Entertainment</option>
<option>Personal Care</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-primary-container">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</section>
<!-- Icon Selection Grid -->
<section class="space-y-4">
<div class="flex justify-between items-end">
<label class="text-[10px] uppercase tracking-[0.2em] font-bold text-outline">Visual Identity</label>
<span class="text-[10px] text-primary-container font-bold">Select Icon</span>
</div>
<div class="grid grid-cols-5 gap-3">
<button class="aspect-square bg-primary-container text-on-primary-container rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(5,230,153,0.15)] ring-2 ring-primary-container" type="button">
<span class="material-symbols-outlined" data-weight="fill">restaurant</span>
</button>
<button class="aspect-square bg-surface-container text-outline hover:text-on-surface hover:bg-surface-container-high transition-all rounded-xl flex items-center justify-center" type="button">
<span class="material-symbols-outlined">pets</span>
</button>
<button class="aspect-square bg-surface-container text-outline hover:text-on-surface hover:bg-surface-container-high transition-all rounded-xl flex items-center justify-center" type="button">
<span class="material-symbols-outlined">directions_car</span>
</button>
<button class="aspect-square bg-surface-container text-outline hover:text-on-surface hover:bg-surface-container-high transition-all rounded-xl flex items-center justify-center" type="button">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
<button class="aspect-square bg-surface-container text-outline hover:text-on-surface hover:bg-surface-container-high transition-all rounded-xl flex items-center justify-center" type="button">
<span class="material-symbols-outlined">fitness_center</span>
</button>
<button class="aspect-square bg-surface-container text-outline hover:text-on-surface hover:bg-surface-container-high transition-all rounded-xl flex items-center justify-center" type="button">
<span class="material-symbols-outlined">medical_services</span>
</button>
<button class="aspect-square bg-surface-container text-outline hover:text-on-surface hover:bg-surface-container-high transition-all rounded-xl flex items-center justify-center" type="button">
<span class="material-symbols-outlined">school</span>
</button>
<button class="aspect-square bg-surface-container text-outline hover:text-on-surface hover:bg-surface-container-high transition-all rounded-xl flex items-center justify-center" type="button">
<span class="material-symbols-outlined">flight</span>
</button>
<button class="aspect-square bg-surface-container text-outline hover:text-on-surface hover:bg-surface-container-high transition-all rounded-xl flex items-center justify-center" type="button">
<span class="material-symbols-outlined">home</span>
</button>
<button class="aspect-square bg-surface-container text-outline hover:text-on-surface hover:bg-surface-container-high transition-all rounded-xl flex items-center justify-center" type="button">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</div>
</section>
<!-- Color Palette -->
<section class="space-y-4">
<label class="text-[10px] uppercase tracking-[0.2em] font-bold text-outline">Accent Color</label>
<div class="flex items-center gap-3 overflow-x-auto hide-scrollbar pb-2">
<button class="w-10 h-10 rounded-full flex-shrink-0 bg-primary ring-offset-4 ring-offset-surface-dim ring-2 ring-primary transition-transform scale-90" type="button"></button>
<button class="w-10 h-10 rounded-full flex-shrink-0 bg-orange-400 hover:scale-110 transition-transform" type="button"></button>
<button class="w-10 h-10 rounded-full flex-shrink-0 bg-blue-400 hover:scale-110 transition-transform" type="button"></button>
<button class="w-10 h-10 rounded-full flex-shrink-0 bg-purple-400 hover:scale-110 transition-transform" type="button"></button>
<button class="w-10 h-10 rounded-full flex-shrink-0 bg-pink-400 hover:scale-110 transition-transform" type="button"></button>
<button class="w-10 h-10 rounded-full flex-shrink-0 bg-yellow-400 hover:scale-110 transition-transform" type="button"></button>
<button class="w-10 h-10 rounded-full flex-shrink-0 bg-cyan-400 hover:scale-110 transition-transform" type="button"></button>
</div>
</section>
<!-- Metadata Cards (Bento style) -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-low p-4 rounded-2xl space-y-2">
<span class="text-[10px] uppercase tracking-wider text-outline">Total Budget</span>
<p class="font-headline font-bold text-on-surface">Auto-calculate</p>
</div>
<div class="bg-surface-container-low p-4 rounded-2xl space-y-2">
<span class="text-[10px] uppercase tracking-wider text-outline">Visibility</span>
<p class="font-headline font-bold text-primary-container">Primary Nav</p>
</div>
</div>
</form>
</main>
<!-- Fixed Action Button at Bottom -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-surface-dim via-surface-dim/95 to-transparent">
<button class="w-full bg-primary-container hover:bg-primary py-5 rounded-2xl text-on-primary-container font-headline font-extrabold text-base tracking-tight shadow-[0_8px_30px_rgba(5,230,153,0.2)] active:scale-[0.98] transition-all duration-200">
            Create Category
        </button>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 w-64 h-64 bg-primary-container/5 rounded-full blur-[100px] -z-10 pointer-events-none"></div>
<div class="fixed bottom-0 left-0 w-80 h-80 bg-primary/5 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
</body></html>
