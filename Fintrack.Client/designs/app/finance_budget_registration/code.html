<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Set Category Budget Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#71c9da",
                        "background-light": "#f2f2f3",
                        "background-dark": "#121416",
                        "surface-dark": "#1e2124", 
                        "surface-input": "#171a1d",
                        "border-dark": "#2a2e33",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(113, 201, 218, 0.3)',
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for dropdowns if needed */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #171a1d; 
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2e33; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b4148; 
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
<!-- Atmospheric background glow to break monotony without being overwhelming -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<!-- Modal Container -->
<div class="relative w-full max-w-[480px] animate-fade-in-up">
<!-- Card -->
<div class="bg-white dark:bg-surface-dark rounded-xl shadow-2xl border border-gray-100 dark:border-border-dark overflow-hidden flex flex-col">
<!-- Header -->
<div class="flex items-center justify-between px-6 pt-6 pb-2">
<div>
<h2 class="text-xl font-bold tracking-tight text-gray-900 dark:text-white">Set Category Budget</h2>
<p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Define spending limits for your tracking.</p>
</div>
<button class="group p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-border-dark transition-colors">
<span class="material-symbols-outlined text-gray-400 group-hover:text-gray-600 dark:group-hover:text-white transition-colors">close</span>
</button>
</div>
<!-- Form Content -->
<div class="p-6 space-y-6">
<!-- Category Select -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-600 dark:text-gray-400">Category</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 group-focus-within:text-primary transition-colors text-[20px]">category</span>
</div>
<select class="block w-full pl-10 pr-10 py-3.5 bg-gray-50 dark:bg-surface-input border border-gray-200 dark:border-border-dark rounded-lg text-base focus:ring-1 focus:ring-primary focus:border-primary focus:outline-none appearance-none transition-all cursor-pointer text-gray-900 dark:text-white shadow-sm">
<option disabled="" selected="" value="">Select a category...</option>
<option value="groceries">Groceries &amp; Food</option>
<option value="transport">Transportation</option>
<option value="housing">Housing &amp; Utilities</option>
<option value="entertainment">Entertainment</option>
<option value="shopping">Shopping</option>
</select>
<div class="absolute inset-y-0 right-0 pr-3.5 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400">unfold_more</span>
</div>
</div>
</div>
<!-- Target Amount (Large Focus) -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-600 dark:text-gray-400">Target Amount</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="text-gray-400 font-semibold text-2xl group-focus-within:text-primary transition-colors">$</span>
</div>
<input class="block w-full pl-10 pr-16 py-4 bg-gray-50 dark:bg-surface-input border border-gray-200 dark:border-border-dark rounded-lg text-3xl font-bold tracking-tight text-gray-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary focus:outline-none placeholder-gray-300 dark:placeholder-gray-700 transition-all shadow-inner" inputmode="decimal" placeholder="0.00" type="text"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
<span class="text-xs font-bold tracking-wider text-gray-400 bg-gray-200 dark:bg-border-dark px-2 py-1 rounded text-transform uppercase">USD</span>
</div>
</div>
</div>
<!-- Frequency Segmented Control -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-600 dark:text-gray-400">Reset Frequency</label>
<div class="grid grid-cols-3 gap-1 p-1 bg-gray-100 dark:bg-surface-input rounded-lg border border-transparent dark:border-border-dark">
<!-- Option: Weekly -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="frequency" type="radio" value="weekly"/>
<div class="w-full flex items-center justify-center py-2 rounded-md text-sm font-semibold text-gray-500 dark:text-gray-400 transition-all duration-200 z-10 relative peer-checked:text-white hover:text-gray-700 dark:hover:text-gray-200">
                                Weekly
                            </div>
<div class="absolute inset-0 bg-primary rounded-md opacity-0 scale-95 transition-all duration-200 peer-checked:opacity-100 peer-checked:scale-100 shadow-md"></div>
</label>
<!-- Option: Monthly -->
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="frequency" type="radio" value="monthly"/>
<div class="w-full flex items-center justify-center py-2 rounded-md text-sm font-semibold text-gray-500 dark:text-gray-400 transition-all duration-200 z-10 relative peer-checked:text-white hover:text-gray-700 dark:hover:text-gray-200">
                                Monthly
                            </div>
<div class="absolute inset-0 bg-primary rounded-md opacity-0 scale-95 transition-all duration-200 peer-checked:opacity-100 peer-checked:scale-100 shadow-md"></div>
</label>
<!-- Option: One-time -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="frequency" type="radio" value="onetime"/>
<div class="w-full flex items-center justify-center py-2 rounded-md text-sm font-semibold text-gray-500 dark:text-gray-400 transition-all duration-200 z-10 relative peer-checked:text-white hover:text-gray-700 dark:hover:text-gray-200">
                                One-time
                            </div>
<div class="absolute inset-0 bg-primary rounded-md opacity-0 scale-95 transition-all duration-200 peer-checked:opacity-100 peer-checked:scale-100 shadow-md"></div>
</label>
</div>
</div>
<!-- Alert Toggle Row -->
<div class="flex items-center justify-between p-4 rounded-xl bg-gray-50 dark:bg-surface-input border border-gray-100 dark:border-border-dark">
<div class="flex items-center gap-3">
<div class="p-2 rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined text-[20px]">notifications_active</span>
</div>
<div class="flex flex-col">
<span class="text-sm font-semibold text-gray-900 dark:text-white">Alert at 80% usage</span>
<span class="text-xs text-gray-500 dark:text-gray-400">Get a push notification</span>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-[#0f1113] peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary peer-checked:shadow-glow"></div>
</label>
</div>
</div>
<!-- Action Footer -->
<div class="px-6 py-5 bg-gray-50 dark:bg-[#15171a] border-t border-gray-100 dark:border-border-dark flex gap-3">
<button class="flex-1 px-4 py-3 rounded-lg text-sm font-semibold text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-border-dark transition-colors focus:outline-none focus:ring-2 focus:ring-gray-400">
                    Cancel
                </button>
<button class="flex-[2] px-4 py-3 rounded-lg text-sm font-bold bg-primary text-[#121416] hover:brightness-110 active:scale-[0.98] transition-all shadow-glow flex items-center justify-center gap-2 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-surface-dark">
<span class="material-symbols-outlined text-[18px]">save</span>
                    Save Budget
                </button>
</div>
</div>
</div>
</body></html>
